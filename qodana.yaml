version: "1.0"
linter: jetbrains/qodana-jvm:2025.2
profile:
  name: qodana.recommended

include:
  - name: QodanaTestCoverage
  - name: CognitiveComplexity
  - name: All

failureConditions:
  testCoverage:
    min: 90
  metrics:
    CognitiveComplexity:
      max: 15
  severityThreshold: high

exclude:
  - name: All
    paths:
      - src/main/java/com/pedronieto/java_template_kit/adapter/exception
      - src/main/java/com/pedronieto/java_template_kit/config
      - src/main/java/com/pedronieto/java_template_kit/domain/exception
